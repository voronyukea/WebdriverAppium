name: Mobile UI Tests (WebdriverIO + Appium via Docker)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-tests:
    # Используем Linux — он стартует мгновенно и всегда доступен
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Устанавливаем локальные зависимости проекта (WebdriverIO)
      - name: Install dependencies
        run: npm ci

      # 4. Скачиваем тестовый APK на хост-машину
      - name: Download Target APK
        run: |
          mkdir -p apps
          curl -L -o apps/NativeDemoApp.apk https://github.com/webdriverio/native-demo-app/releases/download/v1.0.8/Android-NativeDemoApp-v1.0.8.apk

      # 5. Запуск Appium сервера и Эмулятора внутри Docker
      - name: Run Appium and Android Emulator in Docker
        run: |
          docker run -d -p 4723:4723 --device /dev/kvm --name appium-container \
            -v $(pwd)/apps:/opt/apps \
            appium/appium-container:latest

      # 6. Ожидание полной загрузки эмулятора внутри контейнера
      - name: Wait for Emulator to be ready
        run: |
          echo "Waiting for Android emulator to boot..."
          # Даем контейнеру время развернуть Android внутри себя (около 60 секунд)
          sleep 60
          docker exec appium-container adb devices

      # 7. Запуск ваших тестов WebdriverIO
      - name: Execute WebdriverIO Tests
        run: npm run wdio

      # 8. Сохранение логов и отчетов
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webdriverio-logs
          path: |
            .tmp/