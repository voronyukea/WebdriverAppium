name: Mobile UI Tests (WebdriverIO + Appium)

# Пайплайн запускается при пуше в основную ветку или вручную через интерфейс GitHub
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Добавляет кнопку "Run workflow" во вкладке Actions

jobs:
  android-tests:
    # macOS необходим для аппаратного ускорения эмулятора Android (Intel KVM)
    runs-on: macos-14

    steps:
      # 1. Клонируем ваш чистый репозиторий из GitHub в виртуальную машину
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js (LTS 20) для работы WebdriverIO
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Устанавливаем Java (необходима для Android SDK и инструментов Appium)
      - name: Setup Java (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Чистая установка зависимостей из package-lock.json
      - name: Install dependencies
        run: npm ci

      # 5. СКАЧИВАНИЕ APK: Создаем целевую папку и выкачиваем приложение по прямой ссылке
      - name: Download Target APK
        run: |
          mkdir -p apps
          curl -L -o apps/NativeDemoApp.apk https://github.com/webdriverio/native-demo-app/releases/download/v1.0.8/Android-NativeDemoApp-v1.0.8.apk

      # 6. Запуск Android-эмулятора и выполнение тестов
      - name: Run Android Emulator and Execute Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30                    # Стабильная версия Android (Android 11)
          target: google_apis              # Сборка со стандартными API от Google
          arch: x86_64                     # Быстрая архитектура для эмуляции
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-spellchecker: true
          
          # Скрипт выполнится автоматически, как только эмулятор полностью загрузится и будет готов к работе
          script: |
            # Проверяем, что виртуальный девайс успешно поднялся и активен
            adb devices
            
            # Запускаем тесты (WebdriverIO сам поднимет внутренний Appium-сервер и начнет прогон)
            npm run wdio

      # 7. Сбор логов и артефактов (шаг сработает даже если тесты упадут)
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webdriverio-logs
          path: |
            .tmp/
            apps/