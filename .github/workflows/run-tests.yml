name: Mobile UI Tests (WebdriverIO + BrowserStack)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      BROWSERSTACK_APP_URL: ${{ secrets.BROWSERSTACK_APP_URL }}

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Устанавливаем зависимости (WebdriverIO)
      - name: Install dependencies
        run: npm ci

      # 4. Проверяем, что секреты BrowserStack переданы
      - name: Validate BrowserStack secrets
        run: |
          test -n "$BROWSERSTACK_USERNAME"
          test -n "$BROWSERSTACK_ACCESS_KEY"
          test -n "$BROWSERSTACK_APP_URL"

      # 5. Запуск тестов WebdriverIO на BrowserStack
      - name: Execute WebdriverIO Tests
        run: npm run wdio

      # 6. Сохранение логов и отчетов
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webdriverio-logs
          path: |
            .tmp/