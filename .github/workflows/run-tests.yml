name: Mobile UI Tests (WebdriverIO + Appium via Docker Compose)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Устанавливаем зависимости (WebdriverIO)
      - name: Install dependencies
        run: npm ci

      # 4. Запускаем инфраструктуру (УБРАЛИ ДЕФИС)
      - name: Start Docker Compose (Appium + Emulator)
        run: |
          docker compose up -d

      # 5. Проверяем доступность Appium сервера перед тестами
      - name: Wait for Appium Server
        run: |
          echo "Waiting for Appium to respond..."
          until curl -s http://127.0.0.1:4723/status; do
            sleep 5
            echo "Retrying..."
          done
          echo "Appium Server is up and running!"

      # 6. Ждем, пока Android-эмулятор полностью загрузится
      - name: Wait for Android Emulator Boot
        run: |
          echo "Waiting for adb device..."
          docker compose exec -T android-emulator adb wait-for-device
          echo "Waiting for sys.boot_completed=1..."
          until [ "$(docker compose exec -T android-emulator adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do
            sleep 5
            echo "Emulator is still booting..."
          done
          echo "Android emulator is fully booted!"

      # 7. Запуск ваших тестов WebdriverIO
      - name: Execute WebdriverIO Tests
        run: npm run wdio

      # 8. Остановка контейнеров (УБРАЛИ ДЕФИС)
      - name: Stop Docker Compose
        if: always()
        run: docker compose down

      # 9. Сохранение логов и отчетов
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webdriverio-logs
          path: |
            .tmp/