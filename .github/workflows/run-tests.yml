name: Mobile UI Tests via BrowserStack

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  browserstack-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Настраиваем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Устанавливаем зависимости фреймворка
      - name: Install dependencies
        run: npm ci

      # 4. Скачиваем тестовый APK файл
      - name: Download Target APK
        run: |
          mkdir -p apps
          curl -L -o apps/NativeDemoApp.apk https://github.com/webdriverio/native-demo-app/releases/download/v1.0.8/Android-NativeDemoApp-v1.0.8.apk

      # 5. Загружаем APK в BrowserStack (Секреты синхронизированы!)
      - name: Upload App to BrowserStack
        id: upload
        env:
          BS_USER: ${{ secrets.BROWSERSTACK_USERNAME }}
          BS_KEY:  ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          JSON_RESPONSE=$(curl -sS -u "$BS_USER:$BS_KEY" \
            -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
            -F "file=@apps/NativeDemoApp.apk")

          APP_URL=$(echo "$JSON_RESPONSE" | jq -r '.app_url // empty')
          ERROR_MESSAGE=$(echo "$JSON_RESPONSE" | jq -r '.error // .message // empty')

          if [ -z "$APP_URL" ] || [ "$APP_URL" = "null" ]; then
            echo "BrowserStack upload response does not contain a valid app_url."
            if [ -n "$ERROR_MESSAGE" ]; then
              echo "BrowserStack error: $ERROR_MESSAGE"
            fi
            echo "Raw response: $JSON_RESPONSE"
            exit 1
          fi

          echo "BSTACK_APP_URL=$APP_URL" >> $GITHUB_ENV
          echo "App uploaded successfully. URL: $APP_URL"

      # 6. Проверяем формат app_url перед запуском тестов
      - name: Validate BrowserStack app url
        run: |
          if [ -z "$BSTACK_APP_URL" ] || [ "$BSTACK_APP_URL" = "null" ] || [ "$BSTACK_APP_URL" = "undefined" ]; then
            echo "BROWSERSTACK_APP_URL is empty or invalid: '$BSTACK_APP_URL'"
            exit 1
          fi
          if ! echo "$BSTACK_APP_URL" | grep -Eq '^(bs://|[A-Za-z0-9._:-]+(/[A-Za-z0-9._:-]+)?)$'; then
            echo "BROWSERSTACK_APP_URL has unexpected format: '$BSTACK_APP_URL'"
            echo "Expected bs://... or valid custom_id/shareable_id"
            exit 1
          fi

      # 7. Запускаем тесты WebdriverIO
      - name: Execute WebdriverIO Tests
        run: npm run wdio
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_URL: ${{ env.BSTACK_APP_URL }}