name: Mobile UI Tests (WebdriverIO + Appium)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-tests:
    # Возвращаемся на более доступный пул серверов macos-14 (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Download Target APK
        run: |
          mkdir -p apps
          curl -L -o apps/NativeDemoApp.apk https://github.com/webdriverio/native-demo-app/releases/download/v1.0.8/Android-NativeDemoApp-v1.0.8.apk

      # Запуск эмулятора с программным рендерингом (обходим ошибку HVF)
      - name: Run Android Emulator and Execute Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis_playstore
          arch: arm64-v8a                  # Родная архитектура для процессоров Apple M1/M2/M3
          force-avd-creation: false
          # Важно: в конец добавлен флаг -no-accel
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-accel
          disable-spellchecker: true
          script: |
            adb devices
            npm run wdio

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webdriverio-logs
          path: |
            .tmp/
            apps/